/* ---- shared CSS-bar helpers ---- */
const bar=(items,fmt)=>{const m=Math.max(...items.map(i=>Math.abs(i.value)))||1;
  return '<div class="kqchart">'+items.map(i=>{const w=Math.abs(i.value)/m*100,neg=i.value<0;
    return `<div class="kqrow"><span class="kqlab">${i.label}</span><span class="kqtrack"><i style="width:${w}%;background:${neg?'var(--neg)':'var(--blue)'}"></i></span><span class="kqval ${neg?'negv':''}">${fmt(i.value)}</span></div>`;}).join('')+'</div>';};
const split=parts=>{const t=parts.reduce((a,b)=>a+b.value,0)||1;
  return '<div class="kqsplit">'+parts.map((p,i)=>`<div style="width:${Math.max(8,p.value/t*100)}%;background:${i==0?'var(--blue)':'var(--pos)'}">${p.label} ${Math.round(p.value/t*100)}%</div>`).join('')+'</div>';};
const grouped=(rows,la,lb,ca,cb)=>{const m=Math.max(...rows.flatMap(r=>[Math.abs(r.a),Math.abs(r.b)]))||1;
  return '<div class="kqgroup">'+rows.map(r=>`<div class="kqgrow"><div class="gl">${r.label}</div>
    <div class="gb"><span>${la}</span><div class="t"><i style="width:${Math.abs(r.a)/m*100}%;background:${ca}"></i></div><span style="width:60px;color:var(--navy);font-weight:600;text-align:right">${r.fa}</span></div>
    <div class="gb"><span>${lb}</span><div class="t"><i style="width:${Math.abs(r.b)/m*100}%;background:${cb}"></i></div><span style="width:60px;color:var(--navy);font-weight:600;text-align:right">${r.fb}</span></div></div>`).join('')+'</div>';};

const seasonAvgElast = s => {const c=TS.filter(x=>x.season==s);return c.reduce((a,x)=>a+x.elasticity,0)/c.length;};
const seasonRow = s => SEA.by_season.find(x=>x.season==s);
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const PEAKM=["Feb","May","Dec"], VALM=["Nov","Mar"];
const monthSeason=m=>PEAKM.includes(m)?"peak":(VALM.includes(m)?"trough":"shoulder");
const lost=e=>Math.round(Math.abs(e)*10);
const seasonLegend='<div class="legend"><span class="lg s-peak">Peak \u00b7 Dec, Feb, May</span><span class="lg s-shoulder">Shoulder \u00b7 other months</span><span class="lg s-trough">Value \u00b7 Nov, Mar</span></div>';
const OPT={}, ORDER=[];
LS.forEach(r=>{ if(!OPT[r.listing_id]){OPT[r.listing_id]={title:r.listing_title,type:r.property_type}; ORDER.push(r.listing_id);} OPT[r.listing_id][r.season]=r.optimal_price; });

/* ---------- OVERVIEW ---------- */
(()=>{
  const strip=MONTHS.map(m=>{const cls=({peak:'s-peak',shoulder:'s-shoulder',trough:'s-trough'})[monthSeason(m)];
    return `<div class="${cls}">${m}</div>`;}).join('');
  const DEF={peak:{months:"Dec, Feb, May",mean:"Busiest months: year-end, Chinese New Year and the May school break. Guests book regardless, so rates can sit high."},
             shoulder:{months:"All other months",mean:"The steady middle of the year. Demand is ordinary, so price has the most room to be tuned."},
             trough:{months:"Nov, Mar",mean:"The quiet post-holiday lull. Demand is softest, so a lower rate wins back empty nights."}};
  const defRows=SEASONS.map(s=>{const r=seasonRow(s);return `<tr>
      <td><span class="lg s-${s=='trough'?'trough':s}">${sl(s)}</span></td>
      <td>${DEF[s].months}</td>
      <td class="mono">${pct(r.occupancy)}</td>
      <td class="mono">${rm(r.avg_price)}</td>
      <td class="note">${DEF[s].mean}</td></tr>`;}).join('');
  document.getElementById("overview").innerHTML=`
    <h2>Overview</h2>
    <p class="sub">${P.listings} listings &middot; ${P.nights.toLocaleString()} listing-nights &middot; ${RESULTS.meta.period}</p>
    <div class="kpis">
      <div class="kpi"><div class="v">${P.listings}</div><div class="l">Listings priced</div></div>
      <div class="kpi"><div class="v">${rmC(P.observed_revenue)}</div><div class="l">Observed revenue</div></div>
      <div class="kpi"><div class="v">${pct(P.overall_occupancy)}</div><div class="l">Overall occupancy</div></div>
      <div class="kpi"><div class="v">${rmC(P.projected_uplift_rm)}</div><div class="l">Projected annual uplift</div></div>
      <div class="kpi"><div class="v">+${P.projected_uplift_pct}%</div><div class="l">Uplift vs current pricing</div></div>
    </div>
    <div class="callout proof"><b>Method recovery check: </b> the estimator recovers the baked-in elasticity with a mean error of
      <b>${REC.mean_abs_error}</b> against <b>${REC.naive_mean_abs_error}</b> for a naive price-vs-occupancy read
      (${(REC.naive_mean_abs_error/REC.mean_abs_error).toFixed(1)}x better), and the true value sits inside the 95% interval in
      <b>${pct(REC.truth_in_ci_rate)}</b> of the ${REC.n_cells} type-season cells. This is the proof the numbers can be trusted before any rate is changed.</div>
    <h3>What the three seasons mean</h3>
    <p class="note">Each month is grouped into one of three seasons by how much travel demand it draws. The two numbers below, how full the nights run (occupancy) and the nightly rate the market supports, are the metric that separates the seasons: peak is the busiest and dearest, value the quietest and cheapest.</p>
    <table><tr><th>Season</th><th>Months</th><th>Occupancy</th><th>Typical rate</th><th>What it means</th></tr>${defRows}</table>
    <h3>Which season each month falls in</h3>
    ${seasonLegend}
    <div class="seasonstrip">${strip}</div>
    <p class="note">Season is set by the month, not by quarter. August is Shoulder, December is Peak.</p>
    <h3>How to read the numbers</h3>
    <table><tr><th>Metric</th><th>What it means</th></tr>
      <tr><td><b>Occupancy</b></td><td>The share of available nights that get booked. ${pct(P.overall_occupancy)} means roughly that many nights in every hundred are filled.</td></tr>
      <tr><td><b>Nightly rate</b></td><td>The price listed for one night, in RM, before any weekend or public-holiday premium.</td></tr>
      <tr><td><b>Price sensitivity</b></td><td>How many bookings out of 100 you lose when you raise the rate 10 percent. Higher means guests leave faster.</td></tr>
      <tr><td><b>Uplift</b></td><td>The extra profit a year from moving to the recommended rate, compared with current pricing.</td></tr>
    </table>`;
})();

/* ---------- PRICE SENSITIVITY ---------- */
(()=>{
  const byType=TYPES.map(t=>({label:t,value:lost(typeAvgElast(t))}));
  const rows=TS.map(x=>`<tr>
      <td><b>${x.property_type}</b></td><td>${sl(x.season)}</td>
      <td class="mono"><b>${lost(x.elasticity)}</b> of 100</td>
      <td class="mono note">${x.elasticity}</td></tr>`).join('');
  document.getElementById("elasticity").innerHTML=`
    <h2>How much do bookings drop when you raise the price?</h2>
    <p class="sub">Price sensitivity: out of 100 bookings, how many you lose when the nightly rate goes up 10 percent. A higher number means guests walk away faster.</p>
    <h3>Bookings lost per 10% price rise, by room type</h3>
    ${bar(byType, n=>n+" of 100")}
    <p class="note">Studios are the most price-sensitive, so raising their rate empties the calendar fast; larger units barely move, so they can carry a higher price. That is why studios are mostly cut and larger units mostly raised.</p>
    <h3>Full table, by room type and season</h3>
    <table><tr><th>Type</th><th>Season</th><th>Bookings lost per 10% rise</th><th>Sensitivity score</th></tr>${rows}</table>
    <p class="note">The sensitivity score is the measured price-sensitivity figure: a score of -2.0 means a 10% rise costs about 20 bookings in 100. Guests are less sensitive in peak and more sensitive in the value months.</p>`;
})();

/* ---------- RECOMMENDED RATES (price sheet) ---------- */
(()=>{
  const cc={peak:'peak',shoulder:'shoulder',trough:'value'};
  const head=`<tr><th class="name">Listing</th><th>Type</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}</tr>`;
  const body=ORDER.map(id=>{const o=OPT[id];
    const cells=MONTHS.map(m=>{const s=monthSeason(m);return `<td class="cell ${cc[s]}">${Math.round(o[s])}</td>`;}).join('');
    return `<tr><td class="name">${o.title}</td><td>${o.type}</td>${cells}</tr>`;}).join('');
  document.getElementById("optimal").innerHTML=`
    <h2>Recommended nightly rate, every listing by month</h2>
    <p class="sub">The price to list for each of the 15 properties in each month, in RM, before any weekend premium.</p>
    ${seasonLegend}
    <div style="overflow-x:auto"><table class="sheet">${head}${body}</table></div>
    <p class="note">Same place, different price by season: highest in the peak months, lowest in the value months. The rates stay within prices the host has already tested, so they are safe to apply in steps while watching occupancy. Also saved as price-sheet.csv.</p>`;
})();

/* ---------- THE PRICING QUESTIONS (governed assistant) ---------- */
(()=>{
  const f0=n=>rm(n), fp=n=>"+"+Math.round(n)+"%", fe=n=>n.toFixed(2);
  const raiseN=LS.filter(r=>r.optimal_price>r.current_avg_price).length;
  const cutN  =LS.filter(r=>r.optimal_price<r.current_avg_price).length;
  const holdN =LS.length-raiseN-cutN;
  const topUplift=[...LS].sort((a,b)=>b.uplift_rm-a.uplift_rm).slice(0,6);
  const totalUplift=LS.reduce((a,r)=>a+r.uplift_rm,0);
  const peakRev=seasonRow('peak').revenue, shoRev=seasonRow('shoulder').revenue, troRev=seasonRow('trough').revenue;
  const upSeason=s=>LS.filter(r=>r.season==s).reduce((a,r)=>a+r.uplift_rm,0);
  const upPeak=upSeason('peak'),upSho=upSeason('shoulder'),upTro=upSeason('trough');
  const avgOpt=s=>{const c=LS.filter(r=>r.season==s);return c.reduce((a,r)=>a+r.optimal_price,0)/c.length;};
  const studios=LS.filter(r=>r.property_type=='Studio');
  const studioCut=studios.filter(r=>r.optimal_price<r.current_avg_price);
  const bigRaise=[...LS].filter(r=>r.optimal_price>r.current_avg_price).sort((a,b)=>b.uplift_rm-a.uplift_rm).slice(0,6);
  const mostElasticType=TYPES.map(t=>({t,e:typeAvgElast(t)})).sort((a,b)=>a.e-b.e)[0];
  const leastElasticType=TYPES.map(t=>({t,e:typeAvgElast(t)})).sort((a,b)=>b.e-a.e)[0];

  const LOOKUP=[
   {t:"L1",src:"by_listing_season.optimal_price (by season)",
    q:"1 \u00b7 How should my rates move through the year?",
    a:`Rates should climb into the busy months and ease in the quiet ones. Across all 15 listings the recommended nightly rate averages about ${rm(avgOpt('peak'))} in the peak months (Dec, Feb, May), ${rm(avgOpt('shoulder'))} in the shoulder months, and ${rm(avgOpt('trough'))} in the value months (Nov, Mar). Same place, different price by season.`,
    c:bar([{label:"Peak",value:avgOpt('peak')},{label:"Shoulder",value:avgOpt('shoulder')},{label:"Value",value:avgOpt('trough')}], rm)},
   {t:"L2",src:"by_listing_season.uplift_rm (by season)",
    q:"2 \u00b7 Which season holds the most uplift?",
    a:`Most of the money hides in the ordinary shoulder months, not the obvious peak. Shoulder holds about ${rm(upSho)} of the ${rm(P.projected_uplift_rm)} total (${Math.round(upSho/P.projected_uplift_rm*100)}%), more than peak (${rm(upPeak)}) and the value season (${rm(upTro)}) combined. The larger units are most underpriced in shoulder, so start there for the fastest return.`,
    c:bar([{label:"Shoulder",value:upSho},{label:"Peak",value:upPeak},{label:"Value",value:upTro}], f0)},
   {t:"L3",src:"by_listing_season (bookings lost per 10%)",
    q:"3 \u00b7 Which room type is most sensitive to price?",
    a:`${mostElasticType.t} are the most price-sensitive: raise the rate 10% and you lose about ${lost(mostElasticType.e)} bookings in 100. ${leastElasticType.t} are the least, losing only about ${lost(leastElasticType.e)}. Sensitive units should be priced to fill; the rest can carry a premium.`,
    c:bar(TYPES.map(t=>({label:t,value:lost(typeAvgElast(t))})), n=>n+" of 100")},
   {t:"L4",src:"by_listing_season (sensitivity by season)",
    q:"4 \u00b7 Does that sensitivity change with the season?",
    a:`Yes. Guests are less price-sensitive in peak and more so in the value months. A studio loses about ${lost(TS.find(x=>x.property_type=='Studio'&&x.season=='peak').elasticity)} bookings in 100 per 10% rise in peak, but about ${lost(TS.find(x=>x.property_type=='Studio'&&x.season=='trough').elasticity)} in the value season. So peak can hold firm while the quiet months should chase occupancy.`,
    c:bar(SEASONS.map(s=>({label:sl(s),value:lost(seasonAvgElast(s))})), n=>n+" of 100")},
   {t:"L5",src:"by_listing_season (optimal vs current)",
    q:"5 \u00b7 Which listings should I raise, and which should I cut?",
    a:`Of the ${LS.length} listing-and-season prices, ${raiseN} should go up and ${cutN} should come down. The raises are the larger, less price-sensitive units; the cuts are the studios, where filling more nights beats holding a high rate.`,
    c:split([{label:"Raise",value:raiseN},{label:"Cut",value:cutN}])},
   {t:"L6",src:"by_listing_season.uplift_rm",
    q:"6 \u00b7 Where is the biggest money left on the table?",
    a:`The largest single opportunities are ${topUplift[0].listing_title.split(' @ ')[0]} (${sl(topUplift[0].season)}) at about ${rm(topUplift[0].uplift_rm)} and ${topUplift[1].listing_title.split(' @ ')[0]} (${sl(topUplift[1].season)}) at about ${rm(topUplift[1].uplift_rm)} a year. The bigger family units in the shoulder season carry the most upside.`,
    c:bar(topUplift.map(r=>({label:`${r.listing_title.split(' @ ')[0]} (${sl(r.season)[0]})`,value:r.uplift_rm})), f0)},
   {t:"L7",src:"portfolio.projected_uplift_rm / _pct",
    q:"7 \u00b7 How much extra will the new prices make overall?",
    a:`About ${rm(P.projected_uplift_rm)} more a year, or ${P.projected_uplift_pct}% over current pricing, with occupancy holding near ${pct(P.overall_occupancy)} and no extra listings or spend. It comes purely from setting the right rate per listing per season.`,
    c:split([{label:"Current profit base",value:Math.round(P.observed_revenue)},{label:"Uplift",value:Math.round(P.projected_uplift_rm)}])},
   {t:"L8",src:"by_listing_season (Studio, cut)",
    q:"8 \u00b7 Which studios am I over-pricing?",
    a:`${studioCut.length} of the studio prices sit above their best rate. Because studios are the most price-sensitive type, the empty nights cost more than the higher rate earns, so trimming the rate fills the calendar and lifts total profit.`,
    c:bar(studioCut.slice(0,6).map(r=>({label:`${r.listing_title.split(' @ ')[0]} (${sl(r.season)[0]})`,value:r.uplift_pct})), fp)},
   {t:"L9",src:"by_listing_season (raise, by uplift)",
    q:"9 \u00b7 Which listings are clearly under-priced?",
    a:`The strongest raises are the larger units: ${bigRaise.slice(0,3).map(r=>r.listing_title.split(' @ ')[0]+' ('+sl(r.season)+')').join(', ')}. Work the shoulder-season raises first, that is where the fastest return sits. These barely lose bookings when the rate goes up.`,
    c:bar(bigRaise.map(r=>({label:`${r.listing_title.split(' @ ')[0]} (${sl(r.season)[0]})`,value:r.uplift_pct})), fp)},
   {t:"L10",src:"by_listing_season (peak optimal by type)",
    q:"10 \u00b7 What should the peak rate be for each room type?",
    a:`In peak season the rates separate by size: studios land roughly ${rm(Math.min(...LS.filter(r=>r.property_type=='Studio'&&r.season=='peak').map(r=>r.optimal_price)))} to ${rm(Math.max(...LS.filter(r=>r.property_type=='Studio'&&r.season=='peak').map(r=>r.optimal_price)))}, while 3BR units reach ${rm(Math.max(...LS.filter(r=>r.property_type=='3BR'&&r.season=='peak').map(r=>r.optimal_price)))}. Size drives the headline number as much as the season.`,
    c:bar(TYPES.map(t=>{const cells=LS.filter(r=>r.property_type==t&&r.season=='peak');return {label:`${t} peak`,value:cells.reduce((a,r)=>a+r.optimal_price,0)/cells.length};}), rm)},
  ];

  function item(host,qtext,tagHTML,bodyHTML){
    const w=document.createElement('div');w.className='acc';
    w.innerHTML=`<button class="acc-q" aria-expanded="false"><span>${qtext}</span><span class="acc-ic">+</span></button><div class="acc-a">${tagHTML}${bodyHTML}</div>`;
    const b=w.querySelector('.acc-q'),ic=w.querySelector('.acc-ic');
    b.addEventListener('click',()=>{const o=w.classList.toggle('open');b.setAttribute('aria-expanded',o);ic.textContent=o?'\u2212':'+';});
    host.appendChild(w);
  }

  document.getElementById("questions").innerHTML=
    '<h2>The Pricing Questions</h2>'+
    '<p class="sub">The ten questions a host asks most, answered from the locked results, plus four live read-only queries that run in your browser. Click a question to open the answer and chart.</p>'+
    '<div id="kqlookup"></div>'+
    '<h3>Live data queries <span class="gtag live">read-only SQL \u00b7 runs in your browser</span></h3>'+
    '<p class="note">These four answers come from fixed, parameterised SQL run client-side over the deployed listing-season rates (sql.js). The query layer can only pick a track and bind values. It can never write its own SQL, and it never sees the hidden true price sensitivity, which stays in the eval copy used only for the accuracy check.</p>'+
    '<div id="kqlive"><p class="note">Loading the in-browser SQL engine...</p></div>';

  const lookHost=document.getElementById("kqlookup");
  LOOKUP.forEach(x=>item(lookHost,x.q,`<div class="gtag">${x.t} \u00b7 governed lookup \u00b7 <code>results.json</code> &rarr; <code>${x.src}</code></div>`,`<div class="aa">${x.a}</div>${x.c}`));

  /* live sql.js layer */
  const liveHost=document.getElementById("kqlive");
  const sqlBox=s=>`<pre class="sqlbox">${s.replace(/</g,'&lt;')}</pre>`;
  window.__buildLive=function(db){
    liveHost.innerHTML='';
    const run=(sql,params)=>{const st=db.prepare(sql);if(params)st.bind(params);const o=[];while(st.step())o.push(st.getAsObject());st.free();return o;};
    const TR=[];
    {const sql="SELECT listing_title, ROUND(SUM(uplift_rm)) AS uplift\nFROM rates GROUP BY listing_title ORDER BY uplift DESC";
     const rows=run(sql);const top=rows[0];
     const a=`${top.listing_title} carries the single biggest annual opportunity at about ${rm(top.uplift)}. The ranking below is the order to work the portfolio in.`;
     TR.push({q:"11 \u00b7 Which listings carry the biggest annual uplift?",sql,a,
       c:bar(rows.slice(0,8).map(r=>({label:r.listing_title.split(' @ ')[0],value:r.uplift})), n=>rm(n))});}
    {const sql="SELECT season,\n  SUM(CASE WHEN optimal_price>current_avg_price THEN 1 ELSE 0 END) AS raise,\n  SUM(CASE WHEN optimal_price<current_avg_price THEN 1 ELSE 0 END) AS cut\nFROM rates GROUP BY season";
     const rows=run(sql);
     const a=`The mix of raises and cuts shifts by season: peak and shoulder lean toward raising the larger units, while the value season leans toward cutting to fill nights.`;
     TR.push({q:"12 \u00b7 How does the raise-versus-cut split vary by season?",sql,a,
       c:grouped(rows.map(r=>({label:sl(r.season),a:r.raise,b:r.cut,fa:r.raise+' raise',fb:r.cut+' cut'})),'Raise','Cut','var(--pos)','var(--neg)')});}
    {const sql="SELECT property_type, ROUND(AVG(elasticity),2) AS mean_elast\nFROM rates GROUP BY property_type ORDER BY mean_elast";
     const rows=run(sql);
     const a=`Studios are the most price-sensitive on average and the larger units the least, which is the whole basis for cutting the small units and raising the large ones. The score below is the underlying figure, where more negative means more sensitive.`;
     TR.push({q:"13 \u00b7 What is the average price sensitivity by room type?",sql,a,
       c:bar(rows.map(r=>({label:r.property_type,value:r.mean_elast})), n=>n.toFixed(2))});}
    {const sql="SELECT listing_title, season, current_avg_price, optimal_price,\n  ROUND(optimal_price-current_avg_price) AS delta\nFROM rates ORDER BY ABS(optimal_price-current_avg_price) DESC LIMIT 8";
     const rows=run(sql);const top=rows[0];
     const a=`The biggest single move is ${top.listing_title.split(' @ ')[0]} in ${sl(top.season)}, ${top.delta>0?'up':'down'} about ${rm(Math.abs(top.delta))} a night (${rm(top.current_avg_price)} to ${rm(top.optimal_price)}). These are the rate changes to stage first.`;
     TR.push({q:"14 \u00b7 What are the biggest single price moves?",sql,a,
       c:bar(rows.map(r=>({label:`${r.listing_title.split(' @ ')[0]} (${sl(r.season)[0]})`,value:r.delta})), n=>(n>0?'+':'')+rm(n))});}
    TR.forEach(t=>item(liveHost,t.q,`<div class="gtag live">live read-only SQL \u00b7 sql.js</div>${sqlBox(t.sql)}`,`<div class="aa">${t.a}</div>${t.c}`));
  };

  initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`})
   .then(SQL=>{
     const db=new SQL.Database();
     db.run("CREATE TABLE rates(listing_id TEXT, listing_title TEXT, property_type TEXT, season TEXT, elasticity REAL, current_avg_price REAL, optimal_price REAL, current_occ REAL, optimal_occ REAL, uplift_pct REAL, uplift_rm REAL, cell_rev REAL);");
     const st=db.prepare("INSERT INTO rates VALUES (?,?,?,?,?,?,?,?,?,?,?,?)");
     RATE_ROWS.forEach(r=>st.run(r));st.free();
     window.__buildLive(db);
   })
   .catch(()=>{liveHost.innerHTML='<p class="note">The four live queries need an internet connection to load the in-browser SQL engine. The ten questions above are fully available offline.</p>';});
})();
</script>
</body>
</html>
